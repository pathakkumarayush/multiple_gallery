<html>
	<head><title>animation</title></head>

<style>

body {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #0f2027;
  background: -webkit-linear-gradient(to right, #2c5364, #203a43, #0f2027);
  overflow: hidden;
}
.scope {
  position: relative;
  width: 200px;
  height: 250px;
  transform-style: preserve-3d;
  animation: slid 10s linear infinite;
}

.scope:hover{
  animation-play-state: paused;
}
.scope span {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  transform-origin: center;
  transform-style: preserve-3d;
  transform: rotateY(calc(var(--i) * 45deg)) translateZ(350px);
}
.scope span img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border-radius: 10px;
  object-fit: cover;
  transition: 0.5s;
}
.scope span:hover img {
  transform: translateY(-50px) scale(1.2);
  
}
@keyframes slid {
  0% {
    transform: perspective(1000px) rotateY(0deg);
  }
  100% {
    transform: perspective(1000px) rotateY(360deg);
  }
}


</style>

<body>
  <div class="scope">
    <span style="--i:1;"><img src="ayush/a1.jpg" alt="not found"></span>
    <span style="--i:2;"><img src="ayush/a2.jpg" alt="not found"></span>
    <span style="--i:3;"><img src="ayush/a3.jpg" alt="not found"></span>
    <span style="--i:4;"><img src="ayush/a4.jpg" alt="not found"></span>
    <span style="--i:5;"><img src="ayush/a5.jpg" alt="not found"></span>
    <span style="--i:6;"><img src="ayush/a6.jpg" alt="not found"></span>
    <span style="--i:7;"><img src="ayush/a7.jpg" alt="not found"></span>
    <span style="--i:8;"><img src="ayush/a8.jpg" alt="not found"></span>
    <span style="--i:8;"><img src="ayush/a9.jpg" alt="not found"></span>
    <span style="--i:8;"><img src="ayush/a10.jpg" alt="not found"></span>
  </div>


</body>
</html>
